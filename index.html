<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIoTFixer 設備借還管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-3 md:p-8 select-none flex flex-col min-h-screen justify-between">

    <div class="max-w-7xl mx-auto space-y-4 md:space-y-6 w-full mb-8">
        <div class="text-center pt-2 space-y-1">
            <p class="text-xs md:text-sm font-bold tracking-widest text-indigo-500 uppercase">AIoTFixer</p>
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">🛠️AIoTFixer 設備借還管理系統</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
            
            <div class="bg-white p-4 md:p-6 rounded-xl shadow border-t-4 border-indigo-500 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg md:text-xl font-bold text-indigo-600">啟用並掃描設備</h2>
                        <span id="cameraStatus" class="px-2.5 py-1 rounded-full text-[11px] font-semibold bg-gray-200 text-gray-700">未授權相機</span>
                    </div>
                    <div id="reader" class="w-full bg-gray-50 rounded-xl mb-3 border-2 border-dashed border-gray-200 overflow-hidden" style="min-height: 220px;"></div>
                </div>
                
                <div class="flex gap-2">
                    <input type="text" id="manualInput" placeholder="手動輸入設備編號" class="flex-1 border p-2.5 rounded-lg text-sm bg-gray-50 focus:bg-white outline-none">
                    <button onclick="addDeviceFromInput()" class="bg-indigo-500 text-white px-5 py-2.5 rounded-lg hover:bg-indigo-600 active:scale-95 text-sm font-medium whitespace-nowrap">加入</button>
                </div>
            </div>

            <div class="bg-white p-4 md:p-6 rounded-xl shadow flex flex-col justify-between border-t-4 border-green-500">
                <div>
                    <h2 class="text-lg md:text-xl font-bold mb-3 text-indigo-600">人員登記與批次借還</h2>

                    <div class="mb-3 space-y-3">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div>
                                <label class="block font-medium mb-1 text-xs md:text-sm text-gray-600">經手人：</label>
                                <input type="text" id="handlerName" placeholder="經手人姓名" class="w-full border p-2.5 rounded-lg bg-gray-50 text-sm focus:bg-white outline-none">
                            </div>
                            <div>
                                <label class="block font-medium mb-1 text-xs md:text-sm text-gray-600">使用人：</label>
                                <input type="text" id="userName" placeholder="使用人姓名" class="w-full border p-2.5 rounded-lg bg-gray-50 text-sm focus:bg-white outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block font-medium mb-1 text-xs md:text-sm text-gray-600">本次動作：</label>
                            <select id="actionType" class="w-full border p-2.5 rounded-lg bg-gray-50 font-medium text-sm text-gray-800 focus:bg-white outline-none">
                                <option value="借出中" class="text-red-700 font-bold">辦理借用 / 耗材領用</option>
                                <option value="可借用" class="text-green-700 font-bold">辦理歸還</option>
                                <option value="維修中" class="text-green-700 font-bold">故障報修</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-1.5">
                        <h3 class="text-sm font-bold text-gray-700">待處理清單：</h3>
                        <button onclick="clearCart()" class="text-xs text-gray-400 hover:text-red-600 p-1">全部清除</button>
                    </div>
                    <ul id="cartList" class="divide-y divide-gray-200 border rounded-lg max-h-36 overflow-y-auto p-2 bg-gray-50 text-sm">
                        <li class="text-gray-400 py-4 text-center text-xs">請啟用相機並掃描設備 QR Code</li>
                    </ul>
                </div>

                <button onclick="submitBatch()" id="submitBtn" class="w-full bg-green-600 text-white py-3.5 rounded-lg font-bold mt-4 hover:bg-green-700 active:scale-[0.97] text-base shadow-sm">
                    確認送出
                </button>
            </div>
        </div>

        <div class="bg-white p-4 md:p-6 rounded-xl shadow">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                <h2 class="text-lg md:text-xl font-bold text-gray-800">📊 設備即時狀態看板</h2>
                <div class="flex w-full sm:w-auto gap-2 items-center">
                    <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜尋編號、名稱、分類或狀態..." class="border p-2 rounded-lg text-sm w-full sm:w-56 bg-gray-50 focus:bg-white outline-none">
                    <button onclick="fetchDashboard()" class="bg-gray-200 hover:bg-gray-300 px-3.5 py-2 rounded-lg text-sm font-medium whitespace-nowrap">🔄 整理</button>
                </div>
            </div>
            
            <div class="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0">
                <table class="w-full text-left border-collapse table-auto min-w-[500px]">
                    <thead>
                        <tr class="bg-gray-100 border-b text-xs md:text-sm text-gray-600">
                            <th class="p-3 md:p-4">分類</th>
                            <th class="p-3 md:p-4">設備編號</th>
                            <th class="p-3 md:p-4">設備名稱</th>
                            <th class="p-3 md:p-4">目前狀態</th>
                            <th class="p-4">最後異動時間</th>
                        </tr>
                    </thead>
                    <tbody id="dashboardBody" class="divide-y divide-gray-100 text-xs md:text-sm">
                        <tr><td colspan="5" class="text-center p-6 text-gray-400">載入中...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-3 mt-4 pt-4 border-t border-gray-100 text-xs md:text-sm text-gray-500">
                <div id="pageInfo">顯示第 0 到 0 筆，共 0 筆資料</div>
                <div class="flex gap-2 w-full sm:w-auto justify-end">
                    <button id="prevBtn" onclick="changePage(-1)" class="flex-1 sm:flex-none text-center px-4 py-2 border rounded-lg bg-white disabled:opacity-30 font-medium">上一頁</button>
                    <button id="nextBtn" onclick="changePage(1)" class="flex-1 sm:flex-none text-center px-4 py-2 border rounded-lg bg-white disabled:opacity-30 font-medium">下一頁</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="w-full text-center py-4 border-t border-gray-200 text-gray-400 text-xs tracking-wider">
        &copy; <span id="currentYear"></span> AIoTFixer. All Rights Reserved.
    </footer>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwklW3tEbodtReTzsS4zxfgi8x7kBiDCK0cGlKaBxzUpYsG_veyqRw03Iemc4mxGDfXNg/exec"; 
        
        let selectedDevices = [];
        let html5QrcodeScanner;
        let lastScannedCode = "";
        let lastScanTime = 0;

        let allDashboardData = [];   
        let filteredDashboardData = []; 
        let currentPage = 1;
        const rowsPerPage = 10;       

        function initializeCamera() {
            document.getElementById("reader").innerHTML = ""; 
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 15, 
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                        return { width: Math.floor(minEdge * 0.7), height: Math.floor(minEdge * 0.7) };
                    },
                    aspectRatio: 1.0,
                    videoConstraints: { facingMode: { exact: "environment" } }
                },
                false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanError);
            document.getElementById("cameraStatus").textContent = "鏡頭已啟用";
            document.getElementById("cameraStatus").className = "px-2.5 py-1 rounded-full text-[11px] font-semibold bg-green-100 text-green-800";
        }

        function onScanSuccess(decodedText, decodedResult) {
            const currentTime = new Date().getTime();
            if (decodedText === lastScannedCode && (currentTime - lastScanTime) < 2000) return; 
            lastScannedCode = decodedText;
            lastScanTime = currentTime;

            addDeviceToCart(decodedText);
        }

        function onScanError(errorMessage) {
            if (errorMessage.includes("OverconstrainedError") || errorMessage.includes("Constraints")) {
                html5QrcodeScanner.clear().then(() => {
                    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 200 });
                    html5QrcodeScanner.render(onScanSuccess, () => {});
                });
            }
        }

        function addDeviceFromInput() {
            const input = document.getElementById("manualInput");
            const value = input.value.trim().toUpperCase();
            if (value) {
                addDeviceToCart(value);
                input.value = "";
                input.blur();
            }
        }

        function addDeviceToCart(id) {
            const exists = selectedDevices.find(item => item.id === id);
            if (exists) return; 

            const matchedItem = allDashboardData.find(item => String(item.設備編號).trim() === id);
            const isConsumable = matchedItem ? (matchedItem.分類 === "耗材") : false; 
            const currentStatus = matchedItem ? matchedItem.狀態 : "";
            const currentAction = document.getElementById("actionType").value;

            if (currentAction === "借出中" && !isConsumable && currentStatus !== "可借用" && currentStatus !== "") {
                alert(`❌ 無法借用：設備編號 [ ${id} ] 目前狀態為「${currentStatus}」，不開放辦理借用！`);
                return;
            }

            selectedDevices.push({
                id: id,
                isConsumable: isConsumable
            });
            updateCartUI();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function removeFormCart(index) {
            selectedDevices.splice(index, 1);
            updateCartUI();
        }

        function clearCart() {
            selectedDevices = [];
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById("cartList");
            if (selectedDevices.length === 0) {
                list.innerHTML = `<li class="text-gray-400 py-4 text-center text-xs">請啟用相機並掃描設備 QR Code</li>`;
                return;
            }
            list.innerHTML = selectedDevices.map((item, index) => {
                return `
                    <li class="flex justify-between items-center py-2 bg-white px-2.5 rounded-lg my-1 shadow-xs border border-gray-100">
                        <div class="flex items-center flex-1 justify-between">
                            <div class="flex flex-col">
                                <span class="font-mono font-bold text-gray-800 text-sm md:text-base">${item.id}</span>
                                ${item.isConsumable ? '<span class="text-[10px] text-amber-600 font-semibold">經查閱：耗材</span>' : ''}
                            </div>
                            <span class="text-xs text-gray-400 px-3">${item.isConsumable ? '直接登記' : '固定數量(1)'}</span>
                        </div>
                        <button onclick="removeFormCart(${index})" class="text-red-500 text-xs font-semibold p-2 ml-1">移除</button>
                    </li>
                `;
            }).join('');
        }

        function submitBatch() {
            const handler = document.getElementById("handlerName").value.trim();
            const user = document.getElementById("userName").value.trim();
            const type = document.getElementById("actionType").value;
            const btn = document.getElementById("submitBtn");

            if (!handler) return alert("請輸入經手人姓名！");
            if (!user) return alert("請輸入使用人姓名！");
            if (selectedDevices.length === 0) return alert("請先掃描或輸入設備！");

            let confirmMsg = `確定送出這 ${selectedDevices.length} 項項目變更嗎？\n經手人：${handler}\n使用人：${user}\n\n異動清單：\n`;
            selectedDevices.forEach(item => {
                confirmMsg += `- ${item.id} ${item.isConsumable ? '(更新領用資訊)' : ''}\n`;
            });

            if (!confirm(confirmMsg)) return;

            btn.disabled = true;
            btn.textContent = "傳送中...";
            btn.classList.add("opacity-50", "cursor-not-allowed");

            const payload = {
                action: "batchProcess",
                handler: handler,
                user: user,
                type: type,
                items: selectedDevices
            };

            fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => {
                if (res.status === "success") {
                    alert(res.message);
                    clearCart();
                    document.getElementById("userName").value = "";
                    fetchDashboard();
                } else {
                    alert("錯誤：" + res.message);
                }
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = "確認送出";
                btn.classList.remove("opacity-50", "cursor-not-allowed");
            });
        }

        function fetchDashboard() {
            const tbody = document.getElementById("dashboardBody");
            tbody.innerHTML = `<tr><td colspan="5" class="text-center p-6 text-gray-400">載入中...</td></tr>`;
            fetch(GAS_URL).then(res => res.json()).then(data => {
                allDashboardData = data;
                handleSearch(); 
            });
        }

        function handleSearch() {
            const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
            if (!keyword) {
                filteredDashboardData = [...allDashboardData];
            } else {
                filteredDashboardData = allDashboardData.filter(item => {
                    return (
                        (item.分類 && item.分類.toLowerCase().includes(keyword)) ||
                        (item.設備編號 && String(item.設備編號).toLowerCase().includes(keyword)) ||
                        (item.設備名稱 && item.設備名稱.toLowerCase().includes(keyword)) ||
                        (item.狀態 && item.狀態.toLowerCase().includes(keyword))
                    );
                });
            }
            currentPage = 1; 
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById("dashboardBody");
            const totalItems = filteredDashboardData.length;
            
            if (totalItems === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center p-6 text-gray-400">無符合條件的設備。</td></tr>`;
                document.getElementById("pageInfo").textContent = "顯示第 0 到 0 筆，共 0 筆資料";
                document.getElementById("prevBtn").disabled = true;
                document.getElementById("nextBtn").disabled = true;
                return;
            }

            const totalPages = Math.ceil(totalItems / rowsPerPage);
            if (currentPage > totalPages) currentPage = totalPages;
            
            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = Math.min(startIndex + rowsPerPage, totalItems);
            const pageData = filteredDashboardData.slice(startIndex, startIndex + rowsPerPage);

            tbody.innerHTML = pageData.map(item => {
                let statusClass = "bg-gray-100 text-gray-700";
                if (item.狀態 === "借出中") statusClass = "bg-red-50 text-red-700 border border-red-200";
                if (item.狀態 === "可借用") statusClass = "bg-green-50 text-green-700 border border-green-200";
                if (item.分類 === "耗材") statusClass = "bg-amber-50 text-amber-700 border border-amber-200 font-semibold";
                
                if (item.狀態 === "維修中" || item.狀態 === "損壞") statusClass = "bg-orange-50 text-orange-700 border border-orange-200 font-semibold";
                if (item.狀態 === "報廢") statusClass = "bg-gray-200 text-gray-600 border border-gray-300 line-through";

                let cateClass = "bg-gray-100 text-gray-600";
                if (item.分類 === "工具") cateClass = "bg-blue-50 text-blue-700 border border-blue-200 font-medium";
                if (item.分類 === "器材") cateClass = "bg-purple-50 text-purple-700 border border-purple-200 font-medium";
                if (item.分類 === "耗材") cateClass = "bg-amber-100 text-amber-800 font-bold";
                
                let dateStr = "-";
                if (item.異動時間) {
                    dateStr = new Date(item.異動時間).toLocaleString('zh-TW', { 
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit',
                        hour12: false 
                    });
                }

                return `
                    <tr class="hover:bg-gray-50 border-b border-gray-100 transition-colors">
                        <td class="p-3 md:p-4"><span class="px-2 py-0.5 rounded text-xs ${cateClass}">${item.分類}</span></td>
                        <td class="p-3 md:p-4 font-mono font-bold text-gray-800">${item.設備編號}</td>
                        <td class="p-3 md:p-4 text-gray-700 font-medium">${item.設備名稱}</td>
                        <td class="p-3 md:p-4"><span class="px-2.5 py-1 rounded-full text-xs font-bold ${statusClass}">${item.狀態 || '-'}</span></td>
                        <td class="p-3 md:p-4 text-gray-400 font-mono text-xs whitespace-nowrap">${dateStr}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById("pageInfo").textContent = `顯示第 ${startIndex + 1} 到 ${endIndex} 筆，共 ${totalItems} 筆`;
            document.getElementById("prevBtn").disabled = (currentPage === 1);
            document.getElementById("nextBtn").disabled = (currentPage === totalPages);
        }

        function changePage(direction) {
            currentPage += direction;
            renderTable();
        }

        window.onload = function() {
            document.getElementById("currentYear").textContent = new Date().getFullYear();

            document.getElementById("reader").innerHTML = `
                <div class="flex flex-col items-center justify-center h-full p-6 text-center min-h-[220px]">
                    <svg class="w-10 h-10 text-indigo-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <p class="text-xs text-gray-500 mb-3">系統需要存取您的相機以掃描條碼</p>
                    <button onclick="initializeCamera()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-700 active:scale-95 shadow-xs transition-all">
                        開啟相機授權
                    </button>
                </div>
            `;
            fetchDashboard();
        };
    </script>
</body>
</html>
