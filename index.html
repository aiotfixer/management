<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備借還管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <h1 class="text-3xl font-bold text-center text-gray-800">設備借還管理系統</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-indigo-600">Step 1：啟用並掃描設備</h2>
                    <span id="cameraStatus" class="px-3 py-1 rounded-full text-xs font-semibold bg-gray-200 text-gray-700">未授權相機</span>
                </div>
                
                <div id="reader" class="w-full bg-gray-50 rounded-xl mb-4 border-2 border-dashed border-gray-200" style="min-height: 250px;">
                    </div>
                
                <div class="flex gap-2">
                    <input type="text" id="manualInput" placeholder="或手動輸入設備編號" class="flex-1 border p-2 rounded">
                    <button onclick="addDeviceFromInput()" class="bg-indigo-500 text-white px-4 py-2 rounded hover:bg-indigo-600 font-medium">加入</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold mb-4 text-indigo-600">Step 2：確認與批次借還</h2>
                    
                    <div class="mb-4 space-y-3">
                        <div>
                            <label class="block font-medium mb-1 text-gray-600">操作人員姓名：</label>
                            <input type="text" id="userName" placeholder="請輸入您的姓名" class="w-full border p-2.5 rounded-lg bg-gray-50">
                        </div>
                        <div>
                            <label class="block font-medium mb-1 text-gray-600">本次動作：</label>
                            <select id="actionType" class="w-full border p-2.5 rounded-lg bg-gray-50 font-medium text-gray-800">
                                <option value="借出中" class="text-red-700">辦理借用</option>
                                <option value="可借用" class="text-green-700">辦理歸還</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-gray-700">待處理清單：</h3>
                        <button onclick="clearCart()" class="text-sm text-gray-500 hover:text-red-600">全部清除</button>
                    </div>
                    <ul id="cartList" class="divide-y divide-gray-200 border rounded-lg max-h-40 overflow-y-auto p-2 bg-gray-50 text-sm">
                        <li class="text-gray-500 py-3 text-center">請啟用相機並掃描設備 QR Code</li>
                    </ul>
                </div>

                <button onclick="submitBatch()" id="submitBtn" class="w-full bg-green-600 text-white py-3.5 rounded-lg font-bold mt-5 hover:bg-green-700 text-lg shadow-sm">
                    確認送出 (處理多項設備)
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">設備即時狀態看板</h2>
                <button onclick="fetchDashboard()" class="bg-gray-200 hover:bg-gray-300 px-4 py-1.5 rounded text-sm font-medium">重新整理</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse table-auto">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-4">設備編號</th>
                            <th class="p-4">設備名稱</th>
                            <th class="p-4">目前狀態</th>
                            <th class="p-4">異動時間</th>
                            <th class="p-4">使用人員</th>
                        </tr>
                    </thead>
                    <tbody id="dashboardBody" class="divide-y divide-gray-100 text-sm">
                        <tr><td colspan="5" class="text-center p-6 text-gray-400">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwklW3tEbodtReTzsS4zxfgi8x7kBiDCK0cGlKaBxzUpYsG_veyqRw03Iemc4mxGDfXNg/exec"; 
        
        let selectedDevices = [];
        let html5QrcodeScanner;
        let lastScannedCode = "";
        let lastScanTime = 0;

        function triggerVibration() {
            if ("vibrate" in navigator) {
                navigator.vibrate(100); // 震動 100 毫秒
            }
        }

        // --- 📷 相機權限與掃描邏輯 ---
        function initializeCamera() {
            document.getElementById("reader").innerHTML = ""; // 清空提示按鈕

            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 12, // 提升幀率讓感應更靈敏
                    qrbox: { width: 250, height: 250 }, 
                    aspectRatio: 1.0,
                    videoConstraints: {
                        facingMode: { exact: "environment" } 
                    }
                },
                /* verbose= */ false
            );

            // 啟動渲染（此處瀏覽器會彈出相機權限視窗）
            html5QrcodeScanner.render(onScanSuccess, onScanError);
            
            // 更新 UI 狀態
            const statusTag = document.getElementById("cameraStatus");
            statusTag.textContent = "後鏡頭已啟用";
            statusTag.className = "px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-800";
        }

        // 掃描成功處理
        function onScanSuccess(decodedText, decodedResult) {
            const currentTime = new Date().getTime();
            
            if (decodedText === lastScannedCode && (currentTime - lastScanTime) < 2000) {
                return; 
            }

            lastScannedCode = decodedText;
            lastScanTime = currentTime;

            // 觸發純震動回饋
            triggerVibration();

            // 加入暫存清單
            if (!selectedDevices.includes(decodedText)) {
                selectedDevices.push(decodedText);
                updateCartUI();
            }
        }

        // 掃描失敗或硬體限制捕捉
        function onScanError(errorMessage) {
            // 防呆降級方案：若在沒有後鏡頭的裝置（如筆電）上強制指定 environment 報錯，降級為自動選擇
            if (errorMessage.includes("OverconstrainedError") || errorMessage.includes("Constraints")) {
                console.warn("無法強制啟用後鏡頭，切換為自動選擇鏡頭模式。");
                html5QrcodeScanner.clear().then(() => {
                    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 12, qrbox: 250 });
                    html5QrcodeScanner.render(onScanSuccess, () => {});
                });
            }
        }

        // --- 📋 待處理清單 UI 邏輯 ---
        function addDeviceFromInput() {
            const input = document.getElementById("manualInput");
            const value = input.value.trim().toUpperCase();
            if (value && !selectedDevices.includes(value)) {
                selectedDevices.push(value);
                updateCartUI();
                input.value = "";
            }
        }

        function removeFormCart(index) {
            selectedDevices.splice(index, 1);
            updateCartUI();
        }

        function clearCart() {
            selectedDevices = [];
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById("cartList");
            if (selectedDevices.length === 0) {
                list.innerHTML = `<li class="text-gray-500 py-3 text-center">請啟用相機並掃描設備 QR Code</li>`;
                return;
            }
            list.innerHTML = selectedDevices.map((id, index) => `
                <li class="flex justify-between items-center py-2.5">
                    <span class="font-mono font-bold text-gray-800 text-lg">${id}</span>
                    <button onclick="removeFormCart(${index})" class="text-red-500 hover:text-red-700 text-sm">移除</button>
                </li>
            `).join('');
        }

        // --- ☁️ 同步至 Google Sheets ---
        function submitBatch() {
            const user = document.getElementById("userName").value.trim();
            const type = document.getElementById("actionType").value;
            const btn = document.getElementById("submitBtn");

            if (!user) return alert("請輸入操作人員姓名！");
            if (selectedDevices.length === 0) return alert("暫存清單內沒有設備，請先掃描！");

            if (!confirm(`確定將以下 ${selectedDevices.length} 項設備狀態更改為「${type}」？\n${selectedDevices.join(', ')}`)) {
                return;
            }

            btn.disabled = true;
            btn.textContent = "傳送中...";
            btn.classList.add("opacity-50", "cursor-not-allowed");

            const payload = {
                action: "batchProcess",
                user: user,
                type: type,
                items: selectedDevices
            };

            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === "success") {
                    alert(res.message);
                    clearCart();
                    document.getElementById("userName").value = "";
                    fetchDashboard();
                } else {
                    alert("錯誤：" + res.message);
                }
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = "確認送出";
                btn.classList.remove("opacity-50", "cursor-not-allowed");
            });
        }

        // 獲取即時看板資料 (GET)
        function fetchDashboard() {
            const tbody = document.getElementById("dashboardBody");
            
            fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center p-6 text-gray-400">目前沒有設備資料。</td></tr>`;
                    return;
                }
                tbody.innerHTML = data.map(item => {
                    const statusClass = item.狀態 === "可借用" 
                        ? "bg-green-100 text-green-800" 
                        : "bg-red-100 text-red-800";
                    
                    const dateStr = item.時間 ? new Date(item.時間).toLocaleString('zh-TW', { hour12: false }) : "-";

                    return `
                        <tr class="hover:bg-gray-50 border-b border-gray-100 transition-colors">
                            <td class="p-4 font-mono font-bold text-gray-800">${item.設備編號}</td>
                            <td class="p-4 text-gray-700">${item.設備名稱}</td>
                            <td class="p-4">
                                <span class="px-3 py-1.5 rounded-full text-xs font-bold ${statusClass}">
                                    ${item.狀態}
                                </span>
                            </td>
                            <td class="p-4 text-gray-500 font-mono text-xs">${dateStr}</td>
                            <td class="p-4 text-gray-600 font-medium">${item.人員 || "-"}</td>
                        </tr>
                    `;
                }).join('');
            });
        }

        // 網頁載入初始化
        window.onload = function() {
            // 插入引導要求權限按鈕
            document.getElementById("reader").innerHTML = `
                <div class="flex flex-col items-center justify-center h-full p-6 text-center">
                    <svg class="w-12 h-12 text-indigo-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <p class="text-gray-600 mb-4">系統需要存取您的相機以掃描 QR Code</p>
                    <button onclick="initializeCamera()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-indigo-700 shadow-sm transition-colors">
                        開啟後置鏡頭並授權
                    </button>
                </div>
            `;
            fetchDashboard();
        };
    </script>
</body>
</html>
